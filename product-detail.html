<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Product Detail | Aura Inc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=20260313-1" />
</head>
<body>
  <div class="contact-strip">
    <div class="container py-2 small fw-semibold text-center">Aura Inc Product Detail</div>
  </div>

  <nav class="navbar navbar-expand-lg main-nav">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="index.html">
        <img src="assets/Aura-logo-1.png" alt="Aura Inc logo" class="logo-sm" />
        <span class="brand-text">
          <strong>AURA INC</strong>
          <span>Modern linen catalogue</span>
        </span>
      </a>
      <div class="ms-auto d-flex gap-2 flex-wrap">
        <a class="btn-outline-brand" href="hospital-linen.html">Hospital Linen</a>
        <a class="btn-outline-brand" href="hotel-linen.html">Hotel Linen</a>
      </div>
    </div>
  </nav>

  <main class="section-spacing">
    <div class="container">
      <div class="detail-panel">
        <div class="row g-4 align-items-center">
          <div class="col-lg-6">
            <div class="detail-gallery">
              <div id="productThumbs" class="detail-thumbs" aria-label="Product image options"></div>
              <div class="detail-image-wrap">
                <img id="productImage" src="" alt="Product artwork" />
              </div>
            </div>
          </div>
          <div class="col-lg-6">
            <p id="productCategory" class="detail-category mb-3">Category</p>
            <h1 id="productName" class="display-title" style="font-size: clamp(2.1rem, 4vw, 3.8rem);">Product Name</h1>
            <p id="productSubtitle" class="detail-subtitle mb-3"></p>
            <p id="productLead" class="section-copy mb-0"></p>

            <div id="productHighlights" class="spec-grid"></div>

            <a id="backLink" href="hospital-linen.html" class="btn-brand mt-4">Back to Catalogue</a>
          </div>
        </div>

        <div id="productNarrative" class="detail-story"></div>

        <section id="productSpecsSection" class="detail-specs-section">
          <div class="section-header mb-4">
            <span class="eyebrow">Technical Details</span>
            <h2 class="mb-2">Product specifications</h2>
            <p class="section-copy mb-0">A structured view of the approved OT Green Mask details for hospital buyers and procurement teams.</p>
          </div>
          <div class="detail-spec-table-wrap">
            <table class="detail-spec-table">
              <thead>
                <tr>
                  <th>Specification</th>
                  <th>Details</th>
                </tr>
              </thead>
              <tbody id="productSpecsTable"></tbody>
            </table>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script>
    const productMedia = {
      hospital: {
        "OT Green Cap (Autoclavable)": {
          images: [
            "assets/OT_GREEN_CAP_1.jpeg",
            "assets/OT_GREEN_CAP_2.jpeg",
            "assets/OT_GREEN_CAP_3.jpeg",
            "assets/OT_GREEN_CAP_4.jpeg"
          ],
          description: "Autoclavable OT green cap with a swipeable image gallery so buyers can review every supplied product photo."
        },
        "OT Green Mask (Autoclavable)": {
          images: [
            "assets/OT_GREEN_MASK_1.jpeg",
            "assets/OT_GREEN_MASK_2.jpeg"
          ],
          subtitle: "Reusable autoclavable cotton cloth face mask, Doctor OT Mask, surgical mask, free size.",
          description: "Provide your doctors and healthcare faculty with the comfort they deserve through our soft, durable, and comfortable OT Mask, designed for reliability, hygiene, and long-term professional use. Manufactured with premium materials and expert precision, it delivers a practical balance between comfort and performance for hospitals, clinics, and healthcare facilities of all sizes.",
          highlights: [
            { title: "Material", value: "100% Cotton" },
            { title: "Product Weight", value: "5g" },
            { title: "Size", value: "Free" },
            { title: "Product Dimensions", value: "8x6 cm" },
            { title: "Usage", value: "Hospital, Clinic, Nursing Home, Healthcare Facility" },
            { title: "Feature", value: "Washable, Reusable, Breathable, Hypoallergenic, Autoclavable" }
          ],
          sections: [
            {
              title: "Premium Fabric for Medical Environments",
              body: "Our OT mask is made from carefully selected cotton fabric. Each thread is woven tightly to ensure excellent strength while maintaining softness and breathability. The fabric allows air circulation, helping regulate comfort during long professional shifts."
            },
            {
              title: "Softness That Lasts",
              body: "Unlike ordinary fabrics, this OT mask retains its soft texture even after repeated industrial washing. The high-quality yarn helps provide lasting comfort for daily clinical use."
            },
            {
              title: "Precision Manufacturing from a Trusted Supplier",
              body: "We uphold strict quality standards in every production stage, from yarn selection to stitching and final finishing. Each batch is checked for consistency, durability, and size accuracy to meet practical healthcare requirements."
            },
            {
              title: "Durability and Easy Maintenance",
              body: "This OT mask is designed to endure 100+ wash cycles while maintaining its shape, colour, and softness. It dries easily, resists wrinkles after care, and stays fresh after repeated sterilization."
            },
            {
              title: "Hygienic and Professional",
              body: "Hygiene is essential in healthcare, and this mask is built for breathable, reliable, and comfortable use. Its smooth finish supports a clean, professional appearance across hospital and clinic environments."
            },
            {
              title: "Sustainable and Responsible Production",
              body: "Our production approach uses low-impact processes and quality-focused manufacturing standards, helping healthcare buyers source durable products with responsible long-term value."
            },
            {
              title: "OEM and ODM Customization Options",
              body: "Customization support is available for healthcare and institutional orders when required. We can assist with broader production planning while keeping the OT mask range aligned with your supply needs."
            }
          ],
          specTable: [
            { label: "Product Name", value: "OT Mask" },
            { label: "Material", value: "100% Cotton" },
            { label: "Product Weight", value: "5g" },
            { label: "Color Options", value: "Blue, Green" },
            { label: "Weave", value: "Plain" },
            { label: "Size", value: "Free" },
            { label: "Feature", value: "Washable, Reusable, Breathable, Hypoallergenic, Autoclavable" },
            { label: "Function", value: "Anti-Wrinkle, Quick-Dry, Fade-Resistant" },
            { label: "Usage", value: "Hospital, Clinic, Nursing Home, Healthcare Facility" },
            { label: "Product Dimensions", value: "8x6 cm" }
          ]
        }
      }
    };

    function createProductArt(name, accent, theme, category) {
      const safeName = name.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      const base = category === "hotel" ? "#173456" : "#143b63";
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900">
          <defs>
            <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="${base}" />
              <stop offset="100%" stop-color="${accent}" />
            </linearGradient>
          </defs>
          <rect width="1200" height="900" rx="42" fill="url(#bg)" />
          <circle cx="980" cy="180" r="170" fill="rgba(255,255,255,0.12)" />
          <circle cx="220" cy="760" r="190" fill="rgba(255,255,255,0.08)" />
          <rect x="180" y="170" width="840" height="470" rx="42" fill="rgba(255,255,255,0.9)" />
          ${category === "hotel" ? '<rect x="240" y="300" width="720" height="190" rx="34" fill="#fff"/><rect x="280" y="240" width="240" height="110" rx="24" fill="#f7f1e7"/><rect x="680" y="240" width="220" height="110" rx="24" fill="#eef7fb"/>' : '<circle cx="600" cy="250" r="94" fill="#d9fbf7"/><rect x="420" y="330" width="360" height="230" rx="42" fill="#eefcf8"/><rect x="470" y="392" width="260" height="110" rx="28" fill="#d7f6f0"/>'}
          <text x="90" y="760" fill="#ffffff" font-family="Arial, sans-serif" font-size="36" font-weight="700">${safeName}</text>
          <text x="90" y="812" fill="rgba(255,255,255,0.82)" font-family="Arial, sans-serif" font-size="24">${category === "hotel" ? "Hotel Linen Collection" : "Hospital Linen Collection"}</text>
          <text x="90" y="100" fill="rgba(255,255,255,0.72)" font-family="Arial, sans-serif" font-size="22">Theme: ${theme}</text>
        </svg>`;
      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    }

    const params = new URLSearchParams(window.location.search);
    const name = decodeURIComponent(params.get("name") || "Hospital Linen Product");
    const theme = params.get("theme") || "default";
    const accent = decodeURIComponent(params.get("accent") || "#2fcfc5");
    const category = (params.get("category") || "hospital").toLowerCase();
    const detailContent = productMedia[category]?.[name];
    const galleryImages = detailContent?.images?.length
      ? detailContent.images
      : [createProductArt(name, accent, theme, category)];

    const productName = document.getElementById("productName");
    const productImage = document.getElementById("productImage");
    const productCategory = document.getElementById("productCategory");
    const productSubtitle = document.getElementById("productSubtitle");
    const productLead = document.getElementById("productLead");
    const productHighlights = document.getElementById("productHighlights");
    const productNarrative = document.getElementById("productNarrative");
    const productSpecsSection = document.getElementById("productSpecsSection");
    const productSpecsTable = document.getElementById("productSpecsTable");

    productName.textContent = name;
    productImage.src = galleryImages[0];
    productImage.alt = `${name} primary product image`;
    productCategory.textContent = `${category} linen`;
    productSubtitle.textContent = detailContent?.subtitle || "Product detail";
    productLead.textContent = detailContent?.description || "Use the gallery to review the available product images and return to the matching catalogue page when ready.";

    const highlights = detailContent?.highlights?.length
      ? detailContent.highlights
      : [
          { title: "Category", value: `${category} linen` },
          { title: "Theme", value: theme },
          { title: "Navigation", value: "Returns directly to the matching catalogue section." }
        ];

    highlights.forEach((item) => {
      const card = document.createElement("div");
      card.className = "spec-card";
      card.innerHTML = `<strong>${item.title}</strong><span class="muted-copy">${item.value}</span>`;
      productHighlights.appendChild(card);
    });

    if (detailContent?.sections?.length) {
      detailContent.sections.forEach((section) => {
        const article = document.createElement("article");
        article.className = "detail-story-block";
        article.innerHTML = `<h3>${section.title}</h3><p>${section.body}</p>`;
        productNarrative.appendChild(article);
      });
    } else {
      productNarrative.style.display = "none";
    }

    if (detailContent?.specTable?.length) {
      detailContent.specTable.forEach((row) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `<th scope="row">${row.label}</th><td>${row.value}</td>`;
        productSpecsTable.appendChild(tr);
      });
    } else {
      productSpecsSection.style.display = "none";
    }

    const backLink = document.getElementById("backLink");
    backLink.href = category === "hotel" ? "hotel-linen.html" : "hospital-linen.html";

    const thumbs = document.getElementById("productThumbs");

    function setActiveImage(imageSrc, button) {
      productImage.src = imageSrc;
      productImage.alt = `${name} product image`;
      thumbs.querySelectorAll(".detail-thumb").forEach((thumb) => {
        thumb.classList.toggle("active", thumb === button);
        thumb.setAttribute("aria-pressed", thumb === button ? "true" : "false");
      });
    }

    galleryImages.forEach((imageSrc, index) => {
      const button = document.createElement("button");
      button.type = "button";
      button.className = `detail-thumb${index === 0 ? " active" : ""}`;
      button.setAttribute("aria-label", `${name} image ${index + 1}`);
      button.setAttribute("aria-pressed", index === 0 ? "true" : "false");

      const image = document.createElement("img");
      image.src = imageSrc;
      image.alt = `${name} thumbnail ${index + 1}`;
      button.appendChild(image);

      button.addEventListener("click", () => setActiveImage(imageSrc, button));
      thumbs.appendChild(button);
    });
  </script>
</body>
</html>
